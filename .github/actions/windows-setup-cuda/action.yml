name: "Windows - Setup CUDA Toolkit"
description: "Download and extract a specific CUDA Toolkit version on Windows runners"
inputs:
  cuda_version:
    description: "CUDA Toolkit version (currently supported: 11.7 or 12.4)"
    required: true

runs:
  using: "composite"
  steps:
    - name: Prepare directories
      shell: pwsh
      run: |
        $target = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v${{ inputs.cuda_version }}"
        New-Item -ItemType Directory -Force -Path $target | Out-Null
        choco install unzip -y

    - name: Install CUDA Toolkit 11.7 artifacts
      if: ${{ inputs.cuda_version == '11.7' }}
      shell: pwsh
      run: |
        $root = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v11.7"
        $packages = @(
          @{ folder = "cuda_cudart"; file = "cuda_cudart-windows-x86_64-11.7.99-archive.zip" },
          @{ folder = "cuda_nvcc"; file = "cuda_nvcc-windows-x86_64-11.7.99-archive.zip" },
          @{ folder = "cuda_nvrtc"; file = "cuda_nvrtc-windows-x86_64-11.7.99-archive.zip" },
          @{ folder = "libcublas"; file = "libcublas-windows-x86_64-11.7.4.6-archive.zip" },
          @{ folder = "cuda_nvtx"; file = "cuda_nvtx-windows-x86_64-11.7.91-archive.zip" },
          @{ folder = "visual_studio_integration"; file = "visual_studio_integration-windows-x86_64-11.7.91-archive.zip" },
          @{ folder = "cuda_nvprof"; file = "cuda_nvprof-windows-x86_64-11.7.101-archive.zip" },
          @{ folder = "cuda_cccl"; file = "cuda_cccl-windows-x86_64-11.7.91-archive.zip" }
        )
        Push-Location $env:RUNNER_TEMP
        try {
          foreach ($pkg in $packages) {
            $url = "https://developer.download.nvidia.com/compute/cuda/redist/$($pkg.folder)/windows-x86_64/$($pkg.file)"
            Write-Host "Downloading $url"
            curl.exe -O $url
          }
          Get-ChildItem -Filter *.zip | ForEach-Object {
            Expand-Archive -Path $_.FullName -DestinationPath $root -Force
          }
        } finally {
          Remove-Item *.zip -Force -ErrorAction SilentlyContinue
          Pop-Location
        }
        Get-ChildItem -Path $root -Directory | Where-Object { $_.Name -like '*-archive' } | ForEach-Object {
          $src = $_.FullName
          Copy-Item -Path "$src\*" -Destination $root -Recurse -Force
          Remove-Item $src -Recurse -Force
        }
        echo "$root\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        echo "$root\libnvvp" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        echo "CUDA_PATH=$root" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "CUDA_PATH_V11_7=$root" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Install CUDA Toolkit 12.4 artifacts
      if: ${{ inputs.cuda_version == '12.4' }}
      shell: pwsh
      run: |
        $root = "C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA\v12.4"
        $packages = @(
          @{ folder = "cuda_cudart"; file = "cuda_cudart-windows-x86_64-12.4.127-archive.zip" },
          @{ folder = "cuda_nvcc"; file = "cuda_nvcc-windows-x86_64-12.4.131-archive.zip" },
          @{ folder = "cuda_nvrtc"; file = "cuda_nvrtc-windows-x86_64-12.4.127-archive.zip" },
          @{ folder = "libcublas"; file = "libcublas-windows-x86_64-12.4.5.8-archive.zip" },
          @{ folder = "cuda_nvtx"; file = "cuda_nvtx-windows-x86_64-12.4.127-archive.zip" },
          @{ folder = "cuda_profiler_api"; file = "cuda_profiler_api-windows-x86_64-12.4.127-archive.zip" },
          @{ folder = "visual_studio_integration"; file = "visual_studio_integration-windows-x86_64-12.4.127-archive.zip" },
          @{ folder = "cuda_nvprof"; file = "cuda_nvprof-windows-x86_64-12.4.127-archive.zip" },
          @{ folder = "cuda_cccl"; file = "cuda_cccl-windows-x86_64-12.4.127-archive.zip" }
        )
        Push-Location $env:RUNNER_TEMP
        try {
          foreach ($pkg in $packages) {
            $url = "https://developer.download.nvidia.com/compute/cuda/redist/$($pkg.folder)/windows-x86_64/$($pkg.file)"
            Write-Host "Downloading $url"
            curl.exe -O $url
          }
          Get-ChildItem -Filter *.zip | ForEach-Object {
            Expand-Archive -Path $_.FullName -DestinationPath $root -Force
          }
        } finally {
          Remove-Item *.zip -Force -ErrorAction SilentlyContinue
          Pop-Location
        }
        Get-ChildItem -Path $root -Directory | Where-Object { $_.Name -like '*-archive' } | ForEach-Object {
          $src = $_.FullName
          Copy-Item -Path "$src\*" -Destination $root -Recurse -Force
          Remove-Item $src -Recurse -Force
        }
        echo "$root\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        echo "$root\libnvvp" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        echo "CUDA_PATH=$root" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        echo "CUDA_PATH_V12_4=$root" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
