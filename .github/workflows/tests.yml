name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

env:
  VULKAN_SDK_VERSION: '1.3.290.0'

jobs:
  build-win7:
    name: Build Win7 (MinGW)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $version = "${{ env.VULKAN_SDK_VERSION }}"
          if (-not $version) { $version = '1.3.290.0' }
          $sdkRoot = "C:\VulkanSDK\$version"
          if (-not (Test-Path $sdkRoot)) {
            $installer = Join-Path $env:RUNNER_TEMP "VulkanSDK-$version.exe"
            $uri = "https://sdk.lunarg.com/sdk/download/$version/windows/VulkanSDK-$version-Installer.exe?Human=1"
            Write-Host "Downloading Vulkan SDK $version from $uri"
            Invoke-WebRequest -Uri $uri -OutFile $installer -UseBasicParsing
            Write-Host "Installing Vulkan SDK..."
            Start-Process -FilePath $installer -ArgumentList '/S' -NoNewWindow -Wait
          }
          if (-not (Test-Path $sdkRoot)) { throw "Failed to install Vulkan SDK $version" }
          "VULKAN_SDK=$sdkRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$sdkRoot\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install CUDA Toolkit
        shell: pwsh
        run: choco install cuda --no-progress -y

      - name: Configure CUDA environment
        shell: pwsh
        run: |
          $base = 'C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA'
          if (-not (Test-Path $base)) { throw "CUDA base path '$base' not found after installation." }
          $versionDir = Get-ChildItem $base -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $versionDir) { throw "No CUDA versions found under $base" }
          "CUDA_PATH=$($versionDir.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CUDAToolkit_ROOT=$($versionDir.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$($versionDir.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          "$($versionDir.FullName)\extras\CUPTI\lib64" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install OpenCL SDK
        shell: pwsh
        run: |
          $sdkVersion = '2024.05.08'
          $sdkName = "OpenCL-SDK-v$sdkVersion-Win-x64"
          $zipPath = Join-Path $env:RUNNER_TEMP "$sdkName.zip"
          $dest = "C:\OpenCL-SDK"
          if (-not (Test-Path $zipPath)) {
            $uri = "https://github.com/KhronosGroup/OpenCL-SDK/releases/download/v$sdkVersion/$sdkName.zip"
            Write-Host "Downloading OpenCL SDK $sdkVersion ..."
            Invoke-WebRequest -Uri $uri -OutFile $zipPath -UseBasicParsing
          }
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          Expand-Archive -Path $zipPath -DestinationPath $dest
          $root = Join-Path $dest $sdkName
          "OpenCL_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Append
          "OPENCL_SDK_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$root\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Setup MSYS2 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Add MinGW to PATH
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build EVA backend
        shell: pwsh
        run: |
          ./build.bat -d all -Compiler mingw

      - name: Package Win7 artifact
        shell: pwsh
        run: |
          if (-not (Test-Path 'EVA_BACKEND')) { throw 'EVA_BACKEND directory missing'; }
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path 'EVA_BACKEND' -DestinationPath 'artifacts/eva-backend-win7.zip' -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eva-backend-win7
          path: artifacts/eva-backend-win7.zip
          if-no-files-found: error

  build-win:
    name: Build Windows (MSVC)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $version = "${{ env.VULKAN_SDK_VERSION }}"
          if (-not $version) { $version = '1.3.290.0' }
          $sdkRoot = "C:\VulkanSDK\$version"
          if (-not (Test-Path $sdkRoot)) {
            $installer = Join-Path $env:RUNNER_TEMP "VulkanSDK-$version.exe"
            $uri = "https://sdk.lunarg.com/sdk/download/$version/windows/VulkanSDK-$version-Installer.exe?Human=1"
            Write-Host "Downloading Vulkan SDK $version from $uri"
            Invoke-WebRequest -Uri $uri -OutFile $installer -UseBasicParsing
            Write-Host "Installing Vulkan SDK..."
            Start-Process -FilePath $installer -ArgumentList '/S' -NoNewWindow -Wait
          }
          if (-not (Test-Path $sdkRoot)) { throw "Failed to install Vulkan SDK $version" }
          "VULKAN_SDK=$sdkRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$sdkRoot\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install CUDA Toolkit
        shell: pwsh
        run: choco install cuda --no-progress -y

      - name: Configure CUDA environment
        shell: pwsh
        run: |
          $base = 'C:\Program Files\NVIDIA GPU Computing Toolkit\CUDA'
          if (-not (Test-Path $base)) { throw "CUDA base path '$base' not found after installation." }
          $versionDir = Get-ChildItem $base -Directory | Sort-Object Name -Descending | Select-Object -First 1
          if (-not $versionDir) { throw "No CUDA versions found under $base" }
          "CUDA_PATH=$($versionDir.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "CUDAToolkit_ROOT=$($versionDir.FullName)" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$($versionDir.FullName)\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          "$($versionDir.FullName)\extras\CUPTI\lib64" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install OpenCL SDK
        shell: pwsh
        run: |
          $sdkVersion = '2024.05.08'
          $sdkName = "OpenCL-SDK-v$sdkVersion-Win-x64"
          $zipPath = Join-Path $env:RUNNER_TEMP "$sdkName.zip"
          $dest = "C:\OpenCL-SDK"
          if (-not (Test-Path $zipPath)) {
            $uri = "https://github.com/KhronosGroup/OpenCL-SDK/releases/download/v$sdkVersion/$sdkName.zip"
            Write-Host "Downloading OpenCL SDK $sdkVersion ..."
            Invoke-WebRequest -Uri $uri -OutFile $zipPath -UseBasicParsing
          }
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          Expand-Archive -Path $zipPath -DestinationPath $dest
          $root = Join-Path $dest $sdkName
          "OpenCL_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Append
          "OPENCL_SDK_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$root\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Ninja
        shell: pwsh
        run: choco install ninja --no-progress -y

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build EVA backend
        shell: pwsh
        run: |
          ./build.bat -d all -Compiler msvc

      - name: Package Windows artifact
        shell: pwsh
        run: |
          if (-not (Test-Path 'EVA_BACKEND')) { throw 'EVA_BACKEND directory missing'; }
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path 'EVA_BACKEND' -DestinationPath 'artifacts/eva-backend-win.zip' -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eva-backend-win
          path: artifacts/eva-backend-win.zip
          if-no-files-found: error

  build-linux-x86:
    name: Build Linux x86
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Make build script executable
        run: chmod +x build.sh

      - name: Install dependencies and glslc
        env:
          VULKAN_SDK_VERSION: ${{ env.VULKAN_SDK_VERSION }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            python3 \
            python3-pip \
            curl \
            git \
            gcc-10 \
            g++-10 \
            clang-14 \
            clang++-14 \
            libc++-14-dev \
            libc++abi-14-dev \
            libvulkan1 \
            libvulkan-dev \
            vulkan-tools \
            glslang-tools \
            ocl-icd-opencl-dev \
            nvidia-cuda-toolkit
          if ! command -v glslc >/dev/null 2>&1; then
            echo "Building shaderc to provide glslc..."
            tmpdir=$(mktemp -d)
            git clone --depth 1 --branch v2024.1 https://github.com/google/shaderc.git "$tmpdir/shaderc"
            cd "$tmpdir/shaderc"
            python3 ./utils/git-sync-deps
            cmake -GNinja -B build -S . -DCMAKE_BUILD_TYPE=Release -DSHADERC_SKIP_TESTS=ON
            cmake --build build --config Release
            sudo cmake --install build --config Release
            cd /
            rm -rf "$tmpdir"
            sudo ldconfig
          fi

      - name: Build EVA backend
        env:
          CC: gcc-10
          CXX: g++-10
        run: |
          chmod +x build.sh
          ./build.sh -d all -j $(nproc)

      - name: Package Linux x86 artifact
        run: |
          test -d EVA_BACKEND
          mkdir -p artifacts
          tar -czf artifacts/eva-backend-linux-x86.tar.gz EVA_BACKEND

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eva-backend-linux-x86
          path: artifacts/eva-backend-linux-x86.tar.gz
          if-no-files-found: error

  build-linux-arm:
    name: Build Linux ARM64
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Make build script executable
        run: chmod +x build.sh

      - name: Build on ARM64
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          install: |
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y \
              build-essential \
              cmake \
              ninja-build \
              pkg-config \
              python3 \
              python3-pip \
              curl \
              clang-14 \
              clang++-14 \
              libc++-14-dev \
              libc++abi-14-dev \
              libvulkan1 \
              libvulkan-dev \
              vulkan-tools \
              glslang-tools \
              git \
              ocl-icd-opencl-dev
            if ! command -v glslc >/dev/null 2>&1; then
              echo "Building shaderc from source to provide glslc..."
              tmpdir=$(mktemp -d)
              git clone --depth 1 --branch v2024.1 https://github.com/google/shaderc.git "$tmpdir/shaderc"
              cd "$tmpdir/shaderc"
              python3 ./utils/git-sync-deps
              cmake -GNinja -B build -S . -DCMAKE_BUILD_TYPE=Release -DSHADERC_SKIP_TESTS=ON
              cmake --build build --config Release
              cmake --install build --config Release
              cd /
              rm -rf "$tmpdir"
              ldconfig
            fi
          run: |
            set -euo pipefail
            cd "$GITHUB_WORKSPACE"
            chmod +x build.sh
            ./build.sh -d all -j 2
            if [ -d EVA_BACKEND ]; then
              chmod -R a+rX EVA_BACKEND
            fi

      - name: Package Linux ARM artifact
        run: |
          test -d EVA_BACKEND
          mkdir -p artifacts
          tar -czf artifacts/eva-backend-linux-arm.tar.gz EVA_BACKEND

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eva-backend-linux-arm
          path: artifacts/eva-backend-linux-arm.tar.gz
          if-no-files-found: error

  publish-nightly:
    name: Publish Nightly Release
    needs:
      - build-win7
      - build-win
      - build-linux-x86
      - build-linux-arm
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Collect files
        run: |
          mkdir -p uploads
          cp release/eva-backend-win7/eva-backend-win7.zip uploads/
          cp release/eva-backend-win/eva-backend-win.zip uploads/
          cp release/eva-backend-linux-x86/eva-backend-linux-x86.tar.gz uploads/
          cp release/eva-backend-linux-arm/eva-backend-linux-arm.tar.gz uploads/

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: nightly
          name: Nightly
          allowUpdates: true
          removeArtifacts: true
          makeLatest: true
          artifacts: uploads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
