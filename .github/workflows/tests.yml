name: Tests

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: write

env:
  VULKAN_SDK_VERSION: '1.3.290.0'

jobs:
  build-win7:
    name: Build Win7 (MinGW)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $version = "${{ env.VULKAN_SDK_VERSION }}"
          if (-not $version) { $version = '1.3.290.0' }
          $sdkRoot = "C:\VulkanSDK\$version"
          if (-not (Test-Path $sdkRoot)) {
            $installer = Join-Path $env:RUNNER_TEMP "VulkanSDK-$version.exe"
            $uri = "https://sdk.lunarg.com/sdk/download/$version/windows/VulkanSDK-$version-Installer.exe"
            Write-Host "Downloading Vulkan SDK $version from $uri"
            Invoke-WebRequest -Uri $uri -OutFile $installer -UseBasicParsing
            Write-Host "Installing Vulkan SDK..."
            $args = '--accept-licenses', '--default-answer', '--confirm-command', 'install'
            $proc = Start-Process -FilePath $installer -ArgumentList $args -PassThru -Wait
            if ($proc.ExitCode -ne 0) { throw "Vulkan SDK installer failed with exit code $($proc.ExitCode)" }
          }
          if (-not (Test-Path $sdkRoot)) { throw "Failed to install Vulkan SDK $version" }
          "VULKAN_SDK=$sdkRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$sdkRoot\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Setup CUDA Toolkit
        uses: ./.github/actions/windows-setup-cuda
        with:
          cuda_version: '11.7'

      - name: Configure CUDA environment
        shell: pwsh
        run: |
          $cudaPath = $env:CUDA_PATH
          if (-not $cudaPath) { throw "CUDA_PATH not set after CUDA installation." }
          if (-not (Test-Path $cudaPath)) { throw "CUDA path '$cudaPath' not found." }
          "CUDAToolkit_ROOT=$cudaPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          if (Test-Path (Join-Path $cudaPath 'bin')) {
            (Join-Path $cudaPath 'bin') | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          if (Test-Path (Join-Path $cudaPath 'extras\CUPTI\lib64')) {
            (Join-Path $cudaPath 'extras\CUPTI\lib64') | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Install OpenCL SDK
        shell: pwsh
        run: |
          $sdkVersion = '2024.05.08'
          $sdkName = "OpenCL-SDK-v$sdkVersion-Win-x64"
          $zipPath = Join-Path $env:RUNNER_TEMP "$sdkName.zip"
          $dest = "C:\OpenCL-SDK"
          if (-not (Test-Path $zipPath)) {
            $uri = "https://github.com/KhronosGroup/OpenCL-SDK/releases/download/v$sdkVersion/$sdkName.zip"
            Write-Host "Downloading OpenCL SDK $sdkVersion ..."
            Invoke-WebRequest -Uri $uri -OutFile $zipPath -UseBasicParsing
          }
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          Expand-Archive -Path $zipPath -DestinationPath $dest
          $root = Join-Path $dest $sdkName
          "OpenCL_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Append
          "OPENCL_SDK_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$root\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Setup MSYS2 toolchain
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            base-devel
            mingw-w64-x86_64-toolchain
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja

      - name: Add MinGW to PATH
        shell: pwsh
        run: |
          "C:\msys64\mingw64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Build EVA backend
        shell: pwsh
        run: |
          ./build.bat -d all -Compiler mingw

      - name: Package Win7 artifact
        shell: pwsh
        run: |
          if (-not (Test-Path 'EVA_BACKEND')) { throw 'EVA_BACKEND directory missing'; }
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path 'EVA_BACKEND' -DestinationPath 'artifacts/eva-backend-win7.zip' -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eva-backend-win7
          path: artifacts/eva-backend-win7.zip
          if-no-files-found: error

  build-win:
    name: Build Windows (MSVC)
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: windows-2022
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Vulkan SDK
        shell: pwsh
        run: |
          $version = "${{ env.VULKAN_SDK_VERSION }}"
          if (-not $version) { $version = '1.3.290.0' }
          $sdkRoot = "C:\VulkanSDK\$version"
          if (-not (Test-Path $sdkRoot)) {
            $installer = Join-Path $env:RUNNER_TEMP "VulkanSDK-$version.exe"
            $uri = "https://sdk.lunarg.com/sdk/download/$version/windows/VulkanSDK-$version-Installer.exe"
            Write-Host "Downloading Vulkan SDK $version from $uri"
            Invoke-WebRequest -Uri $uri -OutFile $installer -UseBasicParsing
            Write-Host "Installing Vulkan SDK..."
            $args = '--accept-licenses', '--default-answer', '--confirm-command', 'install'
            $proc = Start-Process -FilePath $installer -ArgumentList $args -PassThru -Wait
            if ($proc.ExitCode -ne 0) { throw "Vulkan SDK installer failed with exit code $($proc.ExitCode)" }
          }
          if (-not (Test-Path $sdkRoot)) { throw "Failed to install Vulkan SDK $version" }
          "VULKAN_SDK=$sdkRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$sdkRoot\Bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Setup CUDA Toolkit
        uses: ./.github/actions/windows-setup-cuda
        with:
          cuda_version: '12.4'

      - name: Configure CUDA environment
        shell: pwsh
        run: |
          $cudaPath = $env:CUDA_PATH
          if (-not $cudaPath) { throw "CUDA_PATH not set after CUDA installation." }
          if (-not (Test-Path $cudaPath)) { throw "CUDA path '$cudaPath' not found." }
          "CUDAToolkit_ROOT=$cudaPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          if (Test-Path (Join-Path $cudaPath 'bin')) {
            (Join-Path $cudaPath 'bin') | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }
          if (Test-Path (Join-Path $cudaPath 'extras\CUPTI\lib64')) {
            (Join-Path $cudaPath 'extras\CUPTI\lib64') | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          }

      - name: Install OpenCL SDK
        shell: pwsh
        run: |
          $sdkVersion = '2024.05.08'
          $sdkName = "OpenCL-SDK-v$sdkVersion-Win-x64"
          $zipPath = Join-Path $env:RUNNER_TEMP "$sdkName.zip"
          $dest = "C:\OpenCL-SDK"
          if (-not (Test-Path $zipPath)) {
            $uri = "https://github.com/KhronosGroup/OpenCL-SDK/releases/download/v$sdkVersion/$sdkName.zip"
            Write-Host "Downloading OpenCL SDK $sdkVersion ..."
            Invoke-WebRequest -Uri $uri -OutFile $zipPath -UseBasicParsing
          }
          if (Test-Path $dest) { Remove-Item -Recurse -Force $dest }
          Expand-Archive -Path $zipPath -DestinationPath $dest
          $root = Join-Path $dest $sdkName
          "OpenCL_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Append
          "OPENCL_SDK_ROOT=$root" | Out-File -FilePath $env:GITHUB_ENV -Append
          "$root\bin" | Out-File -FilePath $env:GITHUB_PATH -Append

      - name: Install Ninja
        shell: pwsh
        run: choco install ninja --no-progress -y

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Build EVA backend
        shell: pwsh
        run: |
          ./build.bat -d all -Compiler msvc

      - name: Package Windows artifact
        shell: pwsh
        run: |
          if (-not (Test-Path 'EVA_BACKEND')) { throw 'EVA_BACKEND directory missing'; }
          New-Item -ItemType Directory -Force -Path artifacts | Out-Null
          Compress-Archive -Path 'EVA_BACKEND' -DestinationPath 'artifacts/eva-backend-win.zip' -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eva-backend-win
          path: artifacts/eva-backend-win.zip
          if-no-files-found: error

  build-linux-x86:
    name: Build Linux x86
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Make build script executable
        run: chmod +x build.sh

      - name: Install dependencies and glslc
        env:
          VULKAN_SDK_VERSION: ${{ env.VULKAN_SDK_VERSION }}
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            python3 \
            python3-pip \
            curl \
            git \
            gcc-10 \
            g++-10 \
            clang-14 \
            clang++-14 \
            libomp-14-dev \
            libc++-14-dev \
            libc++abi-14-dev \
            libvulkan1 \
            libvulkan-dev \
            vulkan-tools \
            glslang-tools \
            ocl-icd-opencl-dev \
            nvidia-cuda-toolkit

      - name: Use Vulkan SDK cache
        id: cache-vulkan-linux
        uses: actions/cache@v4
        with:
          path: ./vulkan_sdk
          key: vulkan-sdk-${{ env.VULKAN_SDK_VERSION }}-${{ runner.os }}-${{ runner.arch }}

      - name: Setup Vulkan SDK archive
        if: steps.cache-vulkan-linux.outputs.cache-hit != 'true'
        uses: ./.github/actions/linux-setup-vulkan
        with:
          path: ./vulkan_sdk
          version: ${{ env.VULKAN_SDK_VERSION }}

      - name: Export Vulkan SDK environment
        run: |
          set -euo pipefail
          source ./vulkan_sdk/setup-env.sh
          echo "VULKAN_SDK=$VULKAN_SDK" >> "$GITHUB_ENV"
          echo "$VULKAN_SDK/bin" >> "$GITHUB_PATH"
          if [ -n "${LD_LIBRARY_PATH:-}" ]; then
            echo "LD_LIBRARY_PATH=$VULKAN_SDK/lib:${LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
          else
            echo "LD_LIBRARY_PATH=$VULKAN_SDK/lib" >> "$GITHUB_ENV"
          fi

      - name: Build EVA backend
        env:
          CC: gcc-10
          CXX: g++-10
          CUDAHOSTCXX: /usr/bin/g++-10
        run: |
          chmod +x build.sh
          ./build.sh -d all -j $(nproc)

      - name: Package Linux x86 artifact
        run: |
          test -d EVA_BACKEND
          mkdir -p artifacts
          tar -czf artifacts/eva-backend-linux-x86.tar.gz EVA_BACKEND

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eva-backend-linux-x86
          path: artifacts/eva-backend-linux-x86.tar.gz
          if-no-files-found: error

  build-linux-arm:
    name: Build Linux ARM64
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Make build script executable
        run: chmod +x build.sh

      - name: Use Vulkan SDK cache
        id: cache-vulkan-arm
        uses: actions/cache@v4
        with:
          path: ./vulkan_sdk
          key: vulkan-sdk-${{ env.VULKAN_SDK_VERSION }}-${{ runner.os }}-${{ runner.arch }}

      - name: Setup Vulkan SDK archive
        if: steps.cache-vulkan-arm.outputs.cache-hit != 'true'
        uses: ./.github/actions/linux-setup-vulkan
        with:
          path: ./vulkan_sdk
          version: ${{ env.VULKAN_SDK_VERSION }}

      - name: Build on ARM64
        uses: uraimo/run-on-arch-action@v2
        with:
          arch: aarch64
          distro: ubuntu22.04
          githubToken: ${{ github.token }}
          install: |
            apt-get update
            DEBIAN_FRONTEND=noninteractive apt-get install -y \
              build-essential \
              cmake \
              ninja-build \
              pkg-config \
              python3 \
              python3-pip \
              curl \
              clang-14 \
              clang++-14 \
              libomp-14-dev \
              libc++-14-dev \
              libc++abi-14-dev \
              libvulkan1 \
              libvulkan-dev \
              vulkan-tools \
              glslang-tools \
              git \
              ocl-icd-opencl-dev
          run: |
            set -euo pipefail
            cd "$GITHUB_WORKSPACE"
            sdk_root="$GITHUB_WORKSPACE/vulkan_sdk"
            if [ ! -d "$sdk_root" ]; then
              echo "Cached Vulkan SDK not found at $sdk_root" >&2
              exit 1
            fi
            if [ ! -d "$sdk_root/include" ] && [ -d "$sdk_root/x86_64/include" ]; then
              mkdir -p "$sdk_root/include"
              cp -R "$sdk_root/x86_64/include/." "$sdk_root/include/"
            fi
            rm -rf "$sdk_root/x86_64/bin" "$sdk_root/x86_64/lib" || true
            export VULKAN_SDK="$sdk_root"
            export EVA_CMAKE_ARGS="-DGGML_NATIVE=OFF -DGGML_OPENMP=OFF"
            chmod +x build.sh
            ./build.sh -d all -j 2
            if [ -d EVA_BACKEND ]; then
              chmod -R a+rX EVA_BACKEND
            fi

      - name: Package Linux ARM artifact
        run: |
          test -d EVA_BACKEND
          mkdir -p artifacts
          tar -czf artifacts/eva-backend-linux-arm.tar.gz EVA_BACKEND

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: eva-backend-linux-arm
          path: artifacts/eva-backend-linux-arm.tar.gz
          if-no-files-found: error

  publish-nightly:
    name: Publish Nightly Release
    needs:
      - build-win7
      - build-win
      - build-linux-x86
      - build-linux-arm
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-22.04
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release

      - name: Collect files
        run: |
          mkdir -p uploads
          cp release/eva-backend-win7/eva-backend-win7.zip uploads/
          cp release/eva-backend-win/eva-backend-win.zip uploads/
          cp release/eva-backend-linux-x86/eva-backend-linux-x86.tar.gz uploads/
          cp release/eva-backend-linux-arm/eva-backend-linux-arm.tar.gz uploads/

      - name: Publish release
        uses: ncipollo/release-action@v1
        with:
          tag: nightly
          name: Nightly
          allowUpdates: true
          removeArtifacts: true
          makeLatest: true
          artifacts: uploads/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
